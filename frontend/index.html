<!-- HERO -->

<div class="hero-section">
  <h1>🏙️ Report a Civic Issue</h1>
  <p>Help improve your city by reporting issues like potholes, garbage, broken lights, and more.</p>
</div>

<!-- MAIN CONTAINER -->

<div class="container">

<!-- REPORT FORM -->

<form id="complaintForm" onsubmit="submitComplaint(event)">

  <!-- NAME -->

  <div class="form-group">
    <label>Your Name</label>
    <input
      type="text"
      id="name"
      placeholder="Enter your name"
      required>
  </div>

  <!-- ISSUE -->

  <div class="form-group">
    <label>Issue Description</label>
    <input
      type="text"
      id="issue"
      placeholder="Example: pothole, garbage pile, broken streetlight"
      required>
  </div>

  <!-- LOCATION -->

  <div class="form-group">

```
<label>Location</label>

<input
  type="text"
  id="location"
  placeholder="Type location or detect automatically"
  oninput="searchNearbyLocations(this.value)">

<button type="button" onclick="getLocation()">📍 Detect My Location</button>

<div id="locationSuggestions" style="display:none;"></div>
```

  </div>

  <!-- PHOTO -->

  <div class="form-group">
    <label>Upload Photo (optional)</label>

```
<input
  type="file"
  id="photo"
  accept="image/*"
  onchange="previewImage(event)">
```

  </div>

  <!-- IMAGE PREVIEW -->

  <div id="previewContainer" style="display:none;">
    <img id="preview" style="max-width:200px;">
  </div>

  <!-- SUBMIT -->

  <button type="submit">
    Submit Complaint
  </button>

</form>

<!-- SUCCESS MESSAGE -->

<div id="successMsg" style="display:none;">
  Complaint submitted successfully!
</div>

</div>

<!-- FOOTER -->

<footer class="footer">
  <p>© 2024 CivicSense — Making cities smarter.</p>
</footer>

<!-- SCRIPTS -->

<script src="auth.js"></script>

<script src="script.js"></script>

</body>
