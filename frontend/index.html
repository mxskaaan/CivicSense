<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicSense - Report Issue</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4c6ef5,#8e44ad);
margin:0;
padding:0;
}

.navbar{
background:#1c1f4a;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.navbar h2{
margin:0;
}

.container{
max-width:600px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:80px;
}

button{
width:100%;
padding:12px;
background:#5f6af7;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4b55d1;
}

</style>

</head>

<body>

<div class="navbar">
<h2>CivicSense</h2>
<div>Report Civic Problems</div>
</div>

<div class="container">

<h1>Report a Civic Issue</h1>

<form id="complaintForm" onsubmit="submitComplaint(event)">

<div class="form-group">
<label>Your Name</label>
<input type="text" id="name" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label>Issue Description</label>
<textarea id="issue" placeholder="Describe the problem" required></textarea>
</div>

<div class="form-group">
<label>Location</label>
<input type="text" id="location" placeholder="Enter location" required>
</div>

<div class="form-group">
<label>Upload Photo (optional)</label>
<input type="file" id="photo">
</div>

<button type="submit">Submit Complaint</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
