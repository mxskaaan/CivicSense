<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CivicSense</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Signup Container -->
  <div class="auth-container">
    
    <!-- Logo and Branding -->
    <div class="auth-logo">
      <div class="logo-icon">🏙️</div>
      <h1>CivicSense</h1>
      <p>Join us in making cities smarter</p>
    </div>

    <!-- Signup Form -->
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Sign up to start reporting civic issues</p>

      <form id="signupForm" onsubmit="event.preventDefault(); handleSignup();">
        
        <!-- Full Name Input -->
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            placeholder="John Doe" 
            required
          >
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email Address</label>
          <input 
            type="email" 
            id="signupEmail" 
            placeholder="you@example.com" 
            required
          >
        </div>

        <!-- Phone Input -->
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            placeholder="+1 (555) 000-0000" 
            required
          >
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <input 
            type="password" 
            id="signupPassword" 
            placeholder="Create a strong password" 
            required
          >
        </div>

        <!-- Confirm Password Input -->
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Re-enter your password" 
            required
          >
        </div>

        <!-- Terms & Conditions -->
        <div style="margin-bottom: 24px;">
          <label style="display: flex; align-items: flex-start; gap: 8px; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="terms" required style="width: auto; margin: 4px 0 0 0;">
            <span>I agree to the <a href="#" style="color: #667eea; text-decoration: none; font-weight: 600;">Terms of Service</a> and <a href="#" style="color: #667eea; text-decoration: none; font-weight: 600;">Privacy Policy</a></span>
          </label>
        </div>

        <!-- Signup Button -->
        <button type="submit" class="btn-primary" style="width: 100%; padding: 16px; font-size: 16px; font-weight: 700;">
          <span id="signupText">✨ Create Account</span>
          <span id="signupLoader" style="display: none;" class="spinner"></span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider" style="margin: 28px 0;"></div>

      <!-- Login Link -->
      <p style="text-align: center; font-size: 14px; color: var(--gray-600);">
        Already have an account? 
        <a href="login.html" style="color: #667eea; text-decoration: none; font-weight: 700;">Sign in</a>
      </p>

    </div>

    <!-- Footer Links -->
    <div class="auth-footer">
      <a href="index.html">Report Issue</a>
      <span>•</span>
      <a href="map.html">View Map</a>
      <span>•</span>
      <a href="dashboard.html">Analytics</a>
    </div>

  </div>

  <script>
    // Handle signup
    function handleSignup() {
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('signupEmail').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      // Validation
      if (password !== confirmPassword) {
        alert('⚠️ Passwords do not match!');
        return;
      }

      if (!terms) {
        alert('⚠️ Please accept the Terms of Service');
        return;
      }

      const signupText = document.getElementById('signupText');
      const signupLoader = document.getElementById('signupLoader');
      const submitBtn = document.querySelector('button[type="submit"]');

      // Show loading
      signupText.style.display = 'none';
      signupLoader.style.display = 'inline-block';
      submitBtn.disabled = true;

      // Simulate signup (replace with actual API call)
      setTimeout(() => {
        // Store user session
        const user = {
          email: email,
          name: fullName,
          phone: phone,
          role: 'citizen',
          signupTime: new Date().toISOString()
        };

        localStorage.setItem('civicSenseUser', JSON.stringify(user));

        // Show success and redirect
        alert('✅ Account created successfully!');
        window.location.href = 'index.html';
      }, 1500);
    }
  </script>

</body>

</html>
