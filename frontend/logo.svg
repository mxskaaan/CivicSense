<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with transparency -->
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Location Pin -->
  <g transform="translate(30, 20)">
    <!-- Pin outer circle -->
    <circle cx="35" cy="35" r="38" fill="url(#pinGradient)" opacity="0.2"/>
    
    <!-- Pin shape -->
    <path d="M35 10 C25 10 17 18 17 28 C17 42 35 60 35 60 S53 42 53 28 C53 18 45 10 35 10 Z" 
          fill="url(#pinGradient)" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Inner circle -->
    <circle cx="35" cy="28" r="8" fill="#ffffff"/>
    
    <!-- Checkmark in center -->
    <path d="M32 28 L34 30 L38 26" stroke="url(#pinGradient)" stroke-width="2" 
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- CivicSense Text -->
  <text x="110" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#2c3e50" letter-spacing="-1">CivicSense</text>
  
  <!-- Smart Governance Text -->
  <text x="110" y="75" font-family="Arial, sans-serif" font-size="14" font-weight="500" 
        fill="#64748b" letter-spacing="2">SMART GOVERNANCE</text>
</svg>
